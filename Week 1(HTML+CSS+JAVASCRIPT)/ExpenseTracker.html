<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="ExpenseTracker.css">
</head>
<body>

    <h1>Expense Tracker</h1>

    <form id="expenseForm">

        <input
            type="text"
            id="expenseName"
            placeholder="Expense Name"
            required
        >

        <input
            type="number"
            id="amount"
            placeholder="Amount"
            min="1"
            required
        >

        <select id="category">

            <option>Food</option>
            <option>Transport</option>
            <option>Education</option>
            <option>Shopping</option>
            <option>Entertainment</option>
            <option>Other</option>

        </select>

        <textarea
            id="description"
            placeholder="Description (optional)"
            rows="2"
        ></textarea>

        <button type="submit">
            Add Expense
        </button>

    </form>

    <h2>
        Total Expenses: Rs.
        <span id="total">0</span>
    </h2>

    <div id="filters">

        <h3>Filters</h3>

        <input
            type="text"
            id="searchName"
            placeholder="Search by expense name..."
        >

        <input
            type="text"
            id="filterDescription"
            placeholder="Search by description..."
        >

        <select id="filterCategory">
            <option value="">All Categories</option>
            <option>Food</option>
            <option>Transport</option>
            <option>Education</option>
            <option>Shopping</option>
            <option>Entertainment</option>
            <option>Other</option>
        </select>

        <input
            type="number"
            id="filterMaxAmount"
            placeholder="Max Amount (e.g. up to 500)"
            min="0"
        >

        <div class="date-filters">
            <label>
                From:
                <input type="date" id="filterDateFrom">
            </label>
            <label>
                To:
                <input type="date" id="filterDateTo">
            </label>
        </div>

        <button type="button" id="clearFilters">Clear Filters</button>

    </div>

    <div id="expenseList"></div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal-box">

            <h2>Edit Expense</h2>

            <input type="text" id="editName" placeholder="Expense Name">

            <input type="number" id="editAmount" placeholder="Amount" min="1">

            <select id="editCategory">
                <option>Food</option>
                <option>Transport</option>
                <option>Education</option>
                <option>Shopping</option>
                <option>Entertainment</option>
                <option>Other</option>
            </select>

            <textarea id="editDescription" placeholder="Description (optional)" rows="2"></textarea>

            <div class="modal-buttons">
                <button type="button" id="saveEdit">Save</button>
                <button type="button" id="cancelEdit" class="cancel-btn">Cancel</button>
            </div>

        </div>
    </div>

    <script src="ExpenseTracker.js"></script>

</body>
</html>
