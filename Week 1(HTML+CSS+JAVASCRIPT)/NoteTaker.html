<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Note Taker</title>
    <link rel="stylesheet" href="NoteTaker.css">
</head>
<body>

<div class="container">

    <h1>📝 Advanced Note Taker</h1>

    <form id="noteForm">

        <textarea
            id="noteInput"
            rows="8"
            placeholder="Write your note here..."
        ></textarea>

        <button type="submit">
            Save Note
        </button>

    </form>

    <button id="clearAllBtn" class="clear-btn">
        Clear All Notes
    </button>

    <h2>Saved Notes</h2>

    <p class="subtitle">Search or filter by date to find a note quickly.</p>

    <div class="controls">

        <input
            type="text"
            id="searchInput"
            placeholder="Search notes... (e.g. hor → horseriding)"
        >

        <input
            type="date"
            id="dateFilterInput"
        >

        <button id="clearFiltersBtn" type="button">
            Clear Filters
        </button>

    </div>

    <div id="notesContainer"></div>

</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-overlay">

    <div class="modal-box">

        <h3>Edit Note</h3>

        <textarea id="editTextarea" rows="6"></textarea>

        <div class="modal-actions">

            <button id="saveEditBtn" class="edit-btn">
                Save
            </button>

            <button id="cancelEditBtn" class="delete-btn">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="NoteTaker.js"></script>

</body>
</html>
