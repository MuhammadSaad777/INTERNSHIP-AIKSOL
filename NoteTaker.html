<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Note Taker</title>
    <link rel="stylesheet" href="Day 5.css">
</head>
<body>

<div class="container">

    <h1>📝 Advanced Note Taker</h1>

    <form id="noteForm">

        <textarea
            id="noteInput"
            rows="5"
            placeholder="Write your note here..."
        ></textarea>

        <button type="submit">
            Save Note
        </button>

    </form>

    <button id="clearAllBtn" class="clear-btn">
        Clear All Notes
    </button>

    <h2>Saved Notes</h2>

    <div id="notesContainer"></div>

</div>

<script src="Day 5.js"></script>

</body>
</html>
